<!doctype html>
<html><head><meta charset="utf-8"><title>bee preview</title>
<style>
body { font-family: sans-serif; background: #fef3c7; margin: 0; padding: 24px; }
.row { display: flex; gap: 24px; flex-wrap: wrap; }
.card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.card img { width: 360px; height: 360px; object-fit: contain; display: block; }
.card h3 { margin: 0 0 8px; font-size: 14px; color: #78350f; }
</style></head><body>
<h1>Recraft bee variants</h1>
<div class="row">
  <div class="card"><h3>v1 — neutral idle (Mája style)</h3><img src="bee-v1.svg" alt="v1"></div>
  <div class="card"><h3>v2 — happy / cheering (correct answer)</h3><img src="bee-v2-happy.svg" alt="v2"></div>
  <div class="card"><h3>v3 — sheepish / puzzled (wrong answer)</h3><img src="bee-v3-sheepish.svg" alt="v3"></div>
</div>
</body></html>
